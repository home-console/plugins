name: Validate plugins

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Determine changed plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.detect.outputs.plugins }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed plugin subpaths
        id: detect
        run: |
          set -euo pipefail
          PLUGINS_JSON=$(python _scripts/changed_subpaths.py origin/${{ github.base_ref }} HEAD)
          echo "plugins=$PLUGINS_JSON" >> "$GITHUB_OUTPUT"
          if [ "$PLUGINS_JSON" = "[]" ]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            echo "No plugin folders changed — skipping validation."
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            echo "Plugins to validate: $PLUGINS_JSON"
          fi

  validate:
    name: Validate ${{ matrix.plugin }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.detect-changes.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate plugin.json
        run: python _scripts/validate_plugin.py ${{ matrix.plugin }}
